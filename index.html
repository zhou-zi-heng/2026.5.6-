<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZenMux 创作者工作站</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#f7f8fa;--card:#fff;--text:#1f2937;--text2:#6b7280;--border:#e5e7eb;--pri:#667eea;--pri-h:#5a6fd6;--pri-l:rgba(102,126,234,0.08);--ok:#10b981;--err:#ef4444;--sb-w:280px;--hdr:52px}
        html,body{height:100%;overflow:hidden}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
        .app{display:flex;height:100%}

        /* Sidebar */
        .sb{width:var(--sb-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;flex-shrink:0;z-index:1000;transition:transform .3s}
        .sb-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .sb-hdr h1{font-size:16px;display:flex;align-items:center;gap:6px}
        .sb-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px}
        .sb-ft{padding:8px;border-top:1px solid var(--border)}
        .badge{font-size:11px;color:var(--text2);padding:7px 10px;background:var(--pri-l);border-radius:6px;line-height:1.5;margin-bottom:6px}
        .badge strong{color:var(--pri)}
        .search{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;background:var(--bg);margin-bottom:6px}
        .search:focus{border-color:var(--pri)}
        .cl{list-style:none}
        .ci{padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;margin-bottom:1px;transition:background .12s}
        .ci:hover{background:var(--pri-l)}
        .ci.act{background:var(--pri-l);color:var(--pri);font-weight:600}
        .ci .ct{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .ci .ia{display:none;gap:2px}
        .ci:hover .ia{display:flex}
        .ci .ia button{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;color:var(--text2)}
        .ci .ia button:hover{color:var(--err)}
        .sl{font-size:10px;color:var(--text2);padding:6px 10px 3px;font-weight:600}

        @media(max-width:768px){
            .sb{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%)}
            .sb.open{transform:translateX(0)}
            .sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999}
            .sb-ov.show{display:block}
        }

        /* Main */
        .main{flex:1;display:flex;flex-direction:column;height:100%;min-width:0;overflow:hidden}
        .hdr{height:var(--hdr);min-height:var(--hdr);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:8px;background:var(--card);flex-shrink:0}
        .menu-btn{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);padding:4px}
        @media(max-width:768px){.menu-btn{display:block}}
        .title-in{flex:1;border:none;outline:none;font-size:15px;font-weight:600;background:transparent;color:var(--text);min-width:0}
        .hdr-acts{display:flex;gap:2px;flex-shrink:0}
        .hdr-acts button{background:none;border:none;font-size:16px;cursor:pointer;padding:5px;border-radius:6px;color:var(--text2)}
        .hdr-acts button:hover{background:var(--pri-l);color:var(--pri)}

        /* Messages */
        .msgs{flex:1;overflow-y:auto;padding:14px 12px;min-height:0}
        .lm{text-align:center;margin-bottom:14px}
        .lm button{background:var(--pri-l);border:none;color:var(--pri);padding:5px 14px;border-radius:14px;font-size:12px;cursor:pointer}
        .msg{display:flex;gap:8px;margin-bottom:18px;max-width:860px;margin-left:auto;margin-right:auto;align-items:flex-start}
        .msg.user{flex-direction:row-reverse}
        .av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
        .msg.assistant .av{background:#e8f5e9}
        .msg.user .av{background:#e3f2fd}
        .mb{max-width:80%;min-width:40px}
        .bub{padding:10px 13px;border-radius:14px;line-height:1.7;font-size:14px;word-break:break-word}
        .msg.assistant .bub{background:var(--card);border-top-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
        .msg.user .bub{background:#d1e7ff;border-top-right-radius:4px;white-space:pre-wrap}
        .msg.assistant .bub p{margin-bottom:.5em}.msg.assistant .bub p:last-child{margin-bottom:0}
        .msg.assistant .bub pre{background:#f6f8fa;border-radius:6px;padding:10px;overflow-x:auto;margin:6px 0;font-size:12px}
        .msg.assistant .bub code{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:12px}
        .msg.assistant .bub code:not([class]){background:#f0f0f0;padding:1px 4px;border-radius:3px}
        .mf{margin-bottom:4px}
        .fb{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;background:var(--pri-l);border-radius:4px;font-size:11px;color:var(--pri);margin-right:3px}
        .mm{display:flex;align-items:center;gap:5px;margin-top:4px;font-size:11px;color:var(--text2);flex-wrap:wrap}
        .msg.user .mm{justify-content:flex-end}
        .mm button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:11px;padding:1px 4px;border-radius:3px}
        .mm button:hover{background:var(--pri-l);color:var(--pri)}
        .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text2);gap:8px}
        .empty .ico{font-size:38px}

        /* Input */
        .inp-area{border-top:1px solid var(--border);padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom));background:var(--card);flex-shrink:0}
        .inp-wrap{max-width:860px;margin:0 auto;display:flex;gap:6px;align-items:flex-end}
        .att-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .att-btn:hover{border-color:var(--pri);color:var(--pri)}
        .att-btn.has{border-color:var(--pri);background:var(--pri-l);color:var(--pri)}
        .inp-box{flex:1;min-width:0}
        .inp-box textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:14px;resize:none;outline:none;min-height:36px;max-height:120px;line-height:1.4;font-family:inherit;background:var(--bg)}
        .inp-box textarea:focus{border-color:var(--pri)}
        .send{width:36px;height:36px;border-radius:8px;background:var(--pri);color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .send:hover{background:var(--pri-h)}
        .send.stop{background:var(--err)}
        .att-pan{display:none;position:absolute;bottom:44px;left:0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;box-shadow:0 6px 20px rgba(0,0,0,.1);width:260px;z-index:100}
        .att-pan.show{display:block}

        /* Buttons */
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:6px 12px;border:1px solid var(--border);border-radius:7px;background:var(--card);color:var(--text);font-size:13px;cursor:pointer;transition:all .12s;white-space:nowrap}
        .btn:hover{border-color:var(--pri);color:var(--pri)}
        .btn-p{background:var(--pri);color:#fff;border-color:var(--pri)}.btn-p:hover{background:var(--pri-h)}
        .btn-d{color:var(--err);border-color:var(--err)}.btn-d:hover{background:var(--err);color:#fff}
        .btn-s{padding:4px 9px;font-size:12px}
        .btn-b{width:100%}

        /* Modal */
        .mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;padding:12px}
        .mo.show{display:flex}
        .md{background:var(--card);border-radius:14px;width:100%;max-width:520px;max-height:80vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.15)}
        .md-h{padding:16px 18px 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1}
        .md-h h2{font-size:16px}
        .md-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2)}
        .md-b{padding:14px 18px 18px}
        .fg{margin-bottom:12px}
        .fg label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
        .fg input,.fg textarea,.fg select{width:100%;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit;background:var(--bg)}
        .fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--pri)}
        .fr{display:flex;gap:8px}
        .fr .fg{flex:1}
        .pt{display:flex;align-items:center;gap:7px;margin-bottom:5px}
        .pt input[type="checkbox"]{width:14px;height:14px;accent-color:var(--pri)}
        .pt label{margin:0;font-size:13px;font-weight:500;color:var(--text)}
        .ps{margin-bottom:10px;padding-left:21px}
        .ps input[type="range"]{width:100%;accent-color:var(--pri)}
        .ps .pv{font-size:11px;color:var(--pri);font-weight:600}
        .presets{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
        .presets button{padding:3px 7px;font-size:11px;border:1px solid var(--border);border-radius:5px;background:var(--card);cursor:pointer}
        .presets button:hover{border-color:var(--pri);color:var(--pri)}
        .tabs{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
        .tab{padding:5px 10px;border:none;background:transparent;font-size:12px;cursor:pointer;border-radius:6px;color:var(--text2)}
        .tab.act{background:var(--pri-l);color:var(--pri);font-weight:600}

        /* Toast */
        .tc{position:fixed;top:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
        .tt{padding:9px 14px;border-radius:8px;background:var(--card);box-shadow:0 4px 12px rgba(0,0,0,.12);font-size:13px;animation:si .3s;max-width:280px;pointer-events:auto}
        .tt.ok{border-left:3px solid var(--ok)}.tt.er{border-left:3px solid var(--err)}
        @keyframes si{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}
    </style>
</head>
<body>
<div class="app">
    <div class="sb-ov" id="sbOv" onclick="togSB()"></div>
    <aside class="sb" id="sb">
        <div class="sb-hdr"><h1>🐙 ZenMux</h1><button class="btn btn-s" onclick="openM('set')">⚙️</button></div>
        <div class="sb-body">
            <div class="badge" id="badge"></div>
            <button class="btn btn-p btn-b" onclick="newChat()">➕ 新建对话</button>
            <input type="text" class="search" id="schIn" placeholder="🔍 搜索..." oninput="renderSB()">
            <div class="sl" id="pinLbl" style="display:none">📌 置顶</div>
            <ul class="cl" id="pinList"></ul>
            <div class="sl">💬 对话</div>
            <ul class="cl" id="chatList"></ul>
            <div class="sl" id="arcLbl" style="display:none">📦 归档</div>
            <ul class="cl" id="arcList"></ul>
        </div>
        <div class="sb-ft"><button class="btn btn-b btn-s" onclick="openM('snap')">📦 快照迁移</button></div>
    </aside>

    <div class="main">
        <header class="hdr">
            <button class="menu-btn" onclick="togSB()">☰</button>
            <input type="text" class="title-in" id="titleIn" placeholder="标题" onchange="updTitle(this.value)">
            <div class="hdr-acts">
                <button onclick="openM('cs')" title="设置">🎛️</button>
                <button onclick="openM('exp')" title="导出">📥</button>
                <button onclick="pinC()" title="置顶" id="pinBtn">📌</button>
                <button onclick="arcC()" title="归档">📦</button>
                <button onclick="clrC()" title="清空">🗑️</button>
            </div>
        </header>
        <div class="msgs" id="msgsArea"><div class="empty"><div class="ico">🐙</div><p>开始新的对话吧</p></div></div>
        <div class="inp-area">
            <div class="inp-wrap">
                <div style="position:relative">
                    <button class="att-btn" id="attBtn" onclick="togAtt()">📎</button>
                    <div class="att-pan" id="attPan">
                        <div class="fg" style="margin-bottom:6px"><label>上传文件</label><input type="file" id="attIn" accept=".txt,.md,.py,.json,.csv,.log,.pdf,.docx" onchange="onAtt(this)"></div>
                        <div class="pt"><input type="checkbox" id="attCont"><label for="attCont">🔄 持续参考</label></div>
                        <div id="attInfo" style="display:none;font-size:11px;color:var(--pri);margin-top:4px"></div>
                    </div>
                </div>
                <div class="inp-box"><textarea id="uIn" placeholder="输入消息... (Enter发送)" rows="1" onkeydown="hKey(event)" oninput="aRsz(this)"></textarea></div>
                <button class="send" id="sendBtn" onclick="send()">➤</button>
            </div>
        </div>
    </div>
</div>

<div class="mo" id="mo-set"><div class="md"><div class="md-h"><h2>⚙️ 引擎配置</h2><button class="md-x" onclick="closeM('set')">×</button></div><div class="md-b"><div class="tabs" id="engTabs"></div><button class="btn btn-s" onclick="addEng()" style="margin-bottom:10px">➕ 新增</button><div id="engForm"></div></div></div></div>
<div class="mo" id="mo-cs"><div class="md"><div class="md-h"><h2>🎛️ 会话设置</h2><button class="md-x" onclick="closeM('cs')">×</button></div><div class="md-b"><div class="fg"><label>🎭 System Prompt</label><textarea id="spIn" rows="4" placeholder="全局人设..." onchange="updSP(this.value)"></textarea></div><div class="fg"><label>📚 知识库 (TXT/MD/PY/JSON/CSV/LOG/PDF/DOCX)</label><input type="file" id="kbIn" accept=".txt,.md,.py,.json,.csv,.log,.pdf,.docx" onchange="addKB(this)"><div id="kbList" style="margin-top:6px"></div></div></div></div></div>
<div class="mo" id="mo-exp"><div class="md"><div class="md-h"><h2>📥 导出</h2><button class="md-x" onclick="closeM('exp')">×</button></div><div class="md-b"><div class="fg"><label>模式</label><select id="expFmt" onchange="updExp()"><option value="full">完整记录</option><option value="pure">纯享正文(仅AI)</option></select></div><div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap"><button class="btn btn-s" onclick="eTxt()">📄 TXT</button><button class="btn btn-s" onclick="eHtml()">🎨 HTML</button><button class="btn btn-s" onclick="eDoc()">📘 Word</button></div><div class="fg"><label>⚠️ 防拦截复制区</label><textarea id="expTA" rows="5" style="font-size:11px" readonly></textarea><button class="btn btn-s" onclick="cpExp()" style="margin-top:4px">📋 复制</button></div></div></div></div>
<div class="mo" id="mo-snap"><div class="md"><div class="md-h"><h2>📦 快照</h2><button class="md-x" onclick="closeM('snap')">×</button></div><div class="md-b"><p style="font-size:11px;color:var(--text2);margin-bottom:10px">定期备份防丢失</p><button class="btn btn-p btn-b" onclick="eSnap()" style="margin-bottom:8px">📥 导出快照</button><div class="fg"><label>导入快照</label><input type="file" accept=".json" onchange="iSnap(this)"></div><div id="iosW" style="display:none;padding:8px;background:#fff3cd;border-radius:6px;font-size:11px;color:#856404;margin-top:8px">⚠️ iOS Safari 可能自动清理数据，请定期导出。</div></div></div></div>
<div class="tc" id="tc"></div>

<script>
const SK='zenmux_v3',RW=50;
if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
marked.setOptions({highlight:(c,l)=>{try{return l&&hljs.getLanguage(l)?hljs.highlight(c,{language:l}).value:hljs.highlightAuto(c).value}catch(e){return c}},breaks:true});

const DP={name:'默认引擎',base_url:'',api_key:'',model:'gpt-4o',use_temperature:true,temperature:0.8,use_max_tokens:true,max_tokens:4096,use_top_p:false,top_p:1.0,use_frequency_penalty:false,frequency_penalty:0.0};
let S={profiles:[{...DP}],activeProfileIdx:0,chats:{},currentChatId:null};
let abC=null,stm=false,rOff=0,pFile=null;

// ===== 同域代理请求 =====
function apiF(path, opts={}) {
    // path 如 "models" 或 "chat/completions"
    const p=S.profiles[S.activeProfileIdx]||S.profiles[0];
    const base=(p.base_url||'https://api.openai.com/v1').replace(/\/+$/,'');
    const h=new Headers(opts.headers||{});
    h.set('X-Target-Base', base);
    if(!h.has('Authorization'))h.set('Authorization','Bearer '+p.api_key);
    if(!h.has('Content-Type')&&opts.body)h.set('Content-Type','application/json');
    return fetch('/api/'+path, {...opts, headers:h});
}

// ===== Persistence =====
function gId(){return crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2)}
function load(){try{const r=localStorage.getItem(SK);if(r)Object.assign(S,JSON.parse(r))}catch(e){}if(!Object.keys(S.chats).length)newChat(false);if(!S.currentChatId||!S.chats[S.currentChatId])S.currentChatId=Object.keys(S.chats)[0];if(S.activeProfileIdx>=S.profiles.length)S.activeProfileIdx=0}
function save(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}

// ===== File Parse =====
async function parseF(f){const n=f.name.toLowerCase();if(n.endsWith('.pdf'))return await pPDF(f);if(n.endsWith('.docx'))return await pDOCX(f);return await rTxt(f)}
function rTxt(f){return new Promise((r,j)=>{const x=new FileReader();x.onload=()=>r(x.result);x.onerror=()=>j(x.error);x.readAsText(f)})}
async function pPDF(f){try{const b=await f.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:b}).promise;let t='';for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();t+=c.items.map(x=>x.str).join(' ')+'\n'}return t}catch(e){return'[PDF错误:'+e.message+']'}}
async function pDOCX(f){try{const b=await f.arrayBuffer();return(await mammoth.extractRawText({arrayBuffer:b})).value}catch(e){return'[DOCX错误:'+e.message+']'}}

// ===== Render =====
function render(){renderSB();renderMs();renderBdg();updPin()}
function renderBdg(){const p=S.profiles[S.activeProfileIdx]||S.profiles[0];document.getElementById('badge').innerHTML=`🟢 <strong>${esc(p.name)}</strong> | 🧠 ${esc(p.model)}`}
function updPin(){const c=S.chats[S.currentChatId];document.getElementById('pinBtn').style.opacity=c&&c.is_pinned?'1':'0.5'}

function renderSB(){
    const q=(document.getElementById('schIn')?.value||'').toLowerCase();
    const es=Object.entries(S.chats);
    const pin=es.filter(([,c])=>c.is_pinned&&!c.is_archived&&(!q||c.title.toLowerCase().includes(q)));
    const nor=es.filter(([,c])=>!c.is_pinned&&!c.is_archived&&(!q||c.title.toLowerCase().includes(q)));
    const arc=es.filter(([,c])=>c.is_archived&&(!q||c.title.toLowerCase().includes(q)));
    document.getElementById('pinLbl').style.display=pin.length?'':'none';
    document.getElementById('pinList').innerHTML=pin.map(([id,c])=>ciH(id,c)).join('');
    document.getElementById('chatList').innerHTML=nor.map(([id,c])=>ciH(id,c)).join('');
    document.getElementById('arcLbl').style.display=arc.length?'':'none';
    document.getElementById('arcList').innerHTML=arc.map(([id,c])=>`<li class="ci" style="opacity:.6"><span class="ct">📦 ${esc(c.title)}</span><div class="ia" style="display:flex"><button onclick="event.stopPropagation();unarc('${id}')">♻️</button><button onclick="event.stopPropagation();delC('${id}')">×</button></div></li>`).join('');
}
function ciH(id,c){return`<li class="ci ${id===S.currentChatId?'act':''}" onclick="swC('${id}')">${c.is_pinned?'<span style="font-size:10px">📌</span>':''}<span class="ct">${esc(c.title)}</span><div class="ia"><button onclick="event.stopPropagation();delC('${id}')">×</button></div></li>`}

function renderMs(){
    const a=document.getElementById('msgsArea');const c=S.chats[S.currentChatId];if(!c)return;
    document.getElementById('titleIn').value=c.title;
    const ms=c.messages.filter(m=>m.role!=='system');
    if(!ms.length){a.innerHTML='<div class="empty"><div class="ico">🐙</div><p>开始新的对话吧</p></div>';return}
    const tot=ms.length,st=Math.max(0,tot-RW-rOff),vis=ms.slice(st);
    let h='';
    if(st>0)h+=`<div class="lm"><button onclick="rOff+=${RW};renderMs()">📜 加载更早 (剩${st}条)</button></div>`;
    vis.forEach((msg,vi)=>{
        const ri=st+vi,isU=msg.role==='user',wc=cntW(msg.content);
        let fh='';if(msg.files?.length)fh='<div class="mf">'+msg.files.map(f=>`<span class="fb">${f.continuous?'🔄':'1️⃣'} ${esc(f.filename)}</span>`).join('')+'</div>';
        const bub=isU?esc(msg.content):rMD(msg.content);
        h+=`<div class="msg ${msg.role}"><div class="av">${isU?'🙋‍♂️':'🤖'}</div><div class="mb">${fh}<div class="bub">${bub}</div><div class="mm"><span>${wc}字</span><button onclick="cpM(${ri})">📋</button>${isU?`<button onclick="edM(${ri})">✏️</button>`:`<button onclick="rgM(${ri})">🔄</button>`}${!isU&&msg._is_half?`<button onclick="rsM(${ri})">▶️</button>`:''}<button onclick="dlM(${ri})">🗑️</button></div></div></div>`;
    });
    a.innerHTML=h;a.scrollTop=a.scrollHeight;
}
function rMD(t){try{return marked.parse(t)}catch(e){return esc(t)}}

// ===== Chat Ops =====
function newChat(r=true){const id=gId();S.chats[id]={title:'新对话',messages:[],session_knowledge:[],system_prompt:'',is_pinned:false,is_archived:false};S.currentChatId=id;rOff=0;save();if(r){render();closeSB()}}
function swC(id){S.currentChatId=id;rOff=0;save();render();closeSB()}
function delC(id){if(!confirm('删除？'))return;delete S.chats[id];if(S.currentChatId===id){const k=Object.keys(S.chats);S.currentChatId=k[0]||null;if(!S.currentChatId)newChat(false)}save();render()}
function clrC(){if(!confirm('清空？'))return;const c=S.chats[S.currentChatId];if(c){c.messages=[];rOff=0;save();renderMs()}}
function updTitle(v){const c=S.chats[S.currentChatId];if(c&&v.trim()){c.title=v.trim();save();renderSB()}}
function pinC(){const c=S.chats[S.currentChatId];if(c){c.is_pinned=!c.is_pinned;save();render()}}
function arcC(){const c=S.chats[S.currentChatId];if(c){c.is_archived=true;save();render();toast('已归档')}}
function unarc(id){const c=S.chats[id];if(c){c.is_archived=false;save();render();toast('已恢复')}}

// ===== Msg Ops =====
function dlM(i){const c=S.chats[S.currentChatId];const ms=c.messages.filter(m=>m.role!=='system');const r=c.messages.indexOf(ms[i]);if(r>=0){c.messages.splice(r,1);save();renderMs()}}
function edM(i){const c=S.chats[S.currentChatId];const ms=c.messages.filter(m=>m.role!=='system');const msg=ms[i];const t=prompt('编辑:',msg.content);if(t!==null&&t.trim()){const r=c.messages.indexOf(msg);msg.content=t.trim();c.messages=c.messages.slice(0,r+1);save();renderMs();doAPI()}}
function rgM(i){const c=S.chats[S.currentChatId];const ms=c.messages.filter(m=>m.role!=='system');const r=c.messages.indexOf(ms[i]);if(r>=0){c.messages=c.messages.slice(0,r);save();renderMs();doAPI()}}
function rsM(i){const c=S.chats[S.currentChatId];const ms=c.messages.filter(m=>m.role!=='system');ms[i]._is_half=false;c.messages.push({role:'user',content:'请紧接上文继续往下写，保持文风一致。'});save();renderMs();doAPI()}
function cpM(i){const c=S.chats[S.currentChatId];const ms=c.messages.filter(m=>m.role!=='system');if(ms[i])navigator.clipboard.writeText(ms[i].content).then(()=>toast('已复制')).catch(()=>toast('失败','er'))}

// ===== Attach =====
function togAtt(){document.getElementById('attPan').classList.toggle('show')}
async function onAtt(input){const f=input.files[0];if(!f)return;try{const content=await parseF(f);pFile={filename:f.name,content,continuous:document.getElementById('attCont').checked};document.getElementById('attInfo').style.display='block';document.getElementById('attInfo').textContent='✅ '+f.name+' ('+cntW(content)+'字)';document.getElementById('attBtn').classList.add('has');toast('已选: '+f.name)}catch(e){toast('解析失败','er')}}
function clrAtt(){pFile=null;document.getElementById('attInfo').style.display='none';document.getElementById('attIn').value='';document.getElementById('attBtn').classList.remove('has');document.getElementById('attCont').checked=false}

// ===== SP & KB =====
function updSP(v){const c=S.chats[S.currentChatId];if(c){c.system_prompt=v;save()}}
async function addKB(input){const f=input.files[0];if(!f)return;const c=S.chats[S.currentChatId];if(!c)return;if(!c.session_knowledge)c.session_knowledge=[];if(c.session_knowledge.some(k=>k.filename===f.name)){toast('已存在','er');input.value='';return}try{const content=await parseF(f);c.session_knowledge.push({filename:f.name,content});save();rKB();toast('已添加: '+f.name)}catch(e){toast('解析失败','er')}input.value=''}
function rmKB(i){const c=S.chats[S.currentChatId];if(c?.session_knowledge){c.session_knowledge.splice(i,1);save();rKB()}}
function rKB(){const c=S.chats[S.currentChatId];const el=document.getElementById('kbList');if(!el||!c)return;if(!c.session_knowledge?.length){el.innerHTML='<span style="font-size:11px;color:var(--text2)">暂无</span>';return}el.innerHTML=c.session_knowledge.map((k,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:3px 0"><span style="font-size:11px">📄 ${esc(k.filename)} (${cntW(k.content)}字)</span><button class="btn btn-s btn-d" onclick="rmKB(${i})">×</button></div>`).join('')}
function updCSUI(){const c=S.chats[S.currentChatId];if(!c)return;document.getElementById('spIn').value=c.system_prompt||'';rKB()}

// ===== Send & Stream =====
function send(){
    const input=document.getElementById('uIn');const text=input.value.trim();
    if(!text||stm)return;const c=S.chats[S.currentChatId];if(!c)return;
    const p=S.profiles[S.activeProfileIdx]||S.profiles[0];
    if(!p.api_key){toast('请先配置 API Key','er');return}
    if(!c.messages.length&&c.title==='新对话'){c.title=text.slice(0,12)+(text.length>12?'...':'');document.getElementById('titleIn').value=c.title}
    const msg={role:'user',content:text};
    if(pFile){msg.files=[{...pFile}];clrAtt()}
    c.messages.push(msg);input.value='';aRsz(input);
    document.getElementById('attPan').classList.remove('show');
    save();renderMs();renderSB();doAPI();
}

async function doAPI(){
    const c=S.chats[S.currentChatId];if(!c)return;
    const p=S.profiles[S.activeProfileIdx]||S.profiles[0];

    const apiMsgs=[];
    if(c.system_prompt?.trim())apiMsgs.push({role:'system',content:c.system_prompt.trim()});
    if(c.session_knowledge?.length){const kb=c.session_knowledge.map(k=>`--- ${k.filename} ---\n${k.content}`).join('\n\n');apiMsgs.push({role:'system',content:'【全局参考】：\n'+kb})}
    c.messages.forEach((m,i)=>{if(m.role==='system')return;let ct=m.content;if(m.files?.length){const ft=m.files.filter(f=>f.continuous||i===c.messages.length-1).map(f=>`--- ${f.filename} ---\n${f.content}`).join('\n');if(ft)ct='【附件】\n'+ft+'\n\n【指令】\n'+ct}apiMsgs.push({role:m.role,content:ct})});

    const params={model:p.model,messages:apiMsgs,stream:true};
    if(p.use_temperature)params.temperature=p.temperature;
    if(p.use_max_tokens)params.max_tokens=p.max_tokens;
    if(p.use_top_p)params.top_p=p.top_p;
    if(p.use_frequency_penalty)params.frequency_penalty=p.frequency_penalty;

    stm=true;const btn=document.getElementById('sendBtn');btn.innerHTML='⏹';btn.className='send stop';btn.onclick=stopG;

    const area=document.getElementById('msgsArea');
    const div=document.createElement('div');div.className='msg assistant';
    div.innerHTML='<div class="av">🤖</div><div class="mb"><div class="bub">思考中...</div></div>';
    area.appendChild(div);area.scrollTop=area.scrollHeight;

    let full='',stopped=false;
    abC=new AbortController();

    try{
        const resp=await apiF('chat/completions',{method:'POST',body:JSON.stringify(params),signal:abC.signal});
        if(!resp.ok)throw new Error('HTTP '+resp.status+': '+(await resp.text()).slice(0,200));
        const reader=resp.body.getReader();const dec=new TextDecoder();const bub=div.querySelector('.bub');
        while(true){const{done,value}=await reader.read();if(done)break;const chunk=dec.decode(value,{stream:true});for(const line of chunk.split('\n')){if(!line.startsWith('data: '))continue;const d=line.slice(6).trim();if(d==='[DONE]')break;try{const delta=JSON.parse(d).choices?.[0]?.delta?.content;if(delta){full+=delta;bub.innerHTML=rMD(full)+'<span style="opacity:.4">▌</span>';area.scrollTop=area.scrollHeight}}catch(e){}}}
    }catch(e){if(e.name==='AbortError')stopped=true;else{toast('失败: '+e.message,'er');if(!full){div.remove();rstBtn();return}stopped=true}}

    if(full){c.messages.push({role:'assistant',content:full,_is_half:stopped});save()}
    rstBtn();renderMs();
}
function stopG(){if(abC){abC.abort();abC=null}}
function rstBtn(){stm=false;const b=document.getElementById('sendBtn');b.innerHTML='➤';b.className='send';b.onclick=send}

// ===== Engine Config =====
function rEngF(){
    document.getElementById('engTabs').innerHTML=S.profiles.map((p,i)=>`<button class="tab ${i===S.activeProfileIdx?'act':''}" onclick="swEng(${i})">${esc(p.name)}</button>`).join('');
    const p=S.profiles[S.activeProfileIdx];
    document.getElementById('engForm').innerHTML=`
        <div class="fg"><label>标签</label><input value="${esc(p.name)}" onchange="uEng('name',this.value)"></div>
        <div class="fg"><label>Base URL</label><input value="${esc(p.base_url)}" placeholder="https://api.openai.com/v1" onchange="uEng('base_url',this.value)"></div>
        <div class="fg"><label>API Key</label><input type="password" value="${esc(p.api_key)}" onchange="uEng('api_key',this.value)"><span style="font-size:10px;color:var(--text2)">🔒 仅存本地</span></div>
        <div class="fr"><div class="fg"><label>模型ID</label><input id="mdlIn" value="${esc(p.model)}" onchange="uEng('model',this.value)"></div><div class="fg" style="flex:0 0 auto;display:flex;align-items:flex-end"><button class="btn btn-s" onclick="fMdls()">🔄</button></div></div>
        <div id="mdlBox"></div>
        <h4 style="margin:10px 0 5px;font-size:12px">参数</h4>
        <div class="pt"><input type="checkbox" ${p.use_temperature?'checked':''} onchange="uEng('use_temperature',this.checked);rEngF()"><label>🔥 Temperature</label></div>
        ${p.use_temperature?`<div class="ps"><input type="range" min="0" max="2" step="0.1" value="${p.temperature}" oninput="this.nextElementSibling.textContent=this.value;uEng('temperature',+this.value)"><span class="pv">${p.temperature}</span></div>`:''}
        <div class="pt"><input type="checkbox" ${p.use_max_tokens?'checked':''} onchange="uEng('use_max_tokens',this.checked);rEngF()"><label>📏 Max Tokens</label></div>
        ${p.use_max_tokens?`<div class="ps"><input type="number" style="width:100px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:11px" value="${p.max_tokens}" min="1" max="2000000" onchange="uEng('max_tokens',+this.value)"><div class="presets"><button onclick="sMT(4096)">4K</button><button onclick="sMT(8192)">8K</button><button onclick="sMT(16384)">16K</button><button onclick="sMT(32768)">32K</button><button onclick="sMT(65536)">64K</button><button onclick="sMT(131072)">128K</button><button onclick="sMT(1048576)">1M</button><button onclick="sMT(2000000)">2M</button></div></div>`:''}
        <div class="pt"><input type="checkbox" ${p.use_top_p?'checked':''} onchange="uEng('use_top_p',this.checked);rEngF()"><label>🎲 Top P</label></div>
        ${p.use_top_p?`<div class="ps"><input type="range" min="0" max="1" step="0.05" value="${p.top_p}" oninput="this.nextElementSibling.textContent=this.value;uEng('top_p',+this.value)"><span class="pv">${p.top_p}</span></div>`:''}
        <div class="pt"><input type="checkbox" ${p.use_frequency_penalty?'checked':''} onchange="uEng('use_frequency_penalty',this.checked);rEngF()"><label>🚫 Freq Penalty</label></div>
        ${p.use_frequency_penalty?`<div class="ps"><input type="range" min="-2" max="2" step="0.1" value="${p.frequency_penalty}" oninput="this.nextElementSibling.textContent=this.value;uEng('frequency_penalty',+this.value)"><span class="pv">${p.frequency_penalty}</span></div>`:''}
        <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-s btn-p" onclick="tConn()">🔑 测试</button>
            ${S.profiles.length>1?'<button class="btn btn-s btn-d" onclick="dEng()">🗑️ 删除</button>':''}
        </div>`;
}
function swEng(i){S.activeProfileIdx=i;save();rEngF();renderBdg()}
function uEng(k,v){S.profiles[S.activeProfileIdx][k]=v;save();renderBdg()}
function addEng(){S.profiles.push({...DP,name:'引擎'+(S.profiles.length+1)});S.activeProfileIdx=S.profiles.length-1;save();rEngF()}
function dEng(){if(S.profiles.length<=1||!confirm('确定?'))return;S.profiles.splice(S.activeProfileIdx,1);S.activeProfileIdx=0;save();rEngF();renderBdg()}
function sMT(v){uEng('max_tokens',v);rEngF()}

async function fMdls(){
    const p=S.profiles[S.activeProfileIdx];if(!p.api_key){toast('填写Key','er');return}
    const box=document.getElementById('mdlBox');box.innerHTML='<span style="font-size:11px">获取中...</span>';
    try{
        const r=await apiF('models');
        if(!r.ok)throw new Error('HTTP '+r.status);
        const data=await r.json();const models=(data.data||[]).map(m=>m.id).sort();
        if(!models.length){box.innerHTML='无模型';return}
        box.innerHTML=`<div class="fg"><label>选择 (${models.length}个)</label><select onchange="if(this.value){uEng('model',this.value);document.getElementById('mdlIn').value=this.value;this.closest('.fg').remove();toast('已切换')}"><option value="">(不覆盖)</option>${models.map(m=>`<option>${esc(m)}</option>`).join('')}</select></div>`;
        toast(models.length+'个模型');
    }catch(e){box.innerHTML=`<span style="font-size:11px;color:var(--err)">${esc(e.message)}</span>`}
}

async function tConn(){
    const p=S.profiles[S.activeProfileIdx];if(!p.api_key){toast('填写Key','er');return}
    try{
        const r=await apiF('chat/completions',{method:'POST',body:JSON.stringify({model:p.model,messages:[{role:'user',content:'Hi'}],max_tokens:5})});
        toast(r.ok?'✅ 连通！':'❌ HTTP '+r.status,r.ok?'ok':'er');
    }catch(e){toast('❌ '+e.message,'er')}
}

// ===== Export =====
function updExp(){const c=S.chats[S.currentChatId];if(!c)return;const f=document.getElementById('expFmt').value;const ms=c.messages.filter(m=>m.role!=='system');let t;if(f==='pure')t=ms.filter(m=>m.role==='assistant').map(m=>m.content).join('\n\n');else t=ms.map(m=>`${m.role==='user'?'我':'AI'}:\n${m.content}\n${'─'.repeat(20)}\n`).join('\n');document.getElementById('expTA').value=t}
function eTxt(){const t=document.getElementById('expTA').value;const c=S.chats[S.currentChatId];dl(t,(c?.title||'e')+'.txt','text/plain')}
function eHtml(){const c=S.chats[S.currentChatId];const p=S.profiles[S.activeProfileIdx];const f=document.getElementById('expFmt').value;const ms=f==='pure'?c.messages.filter(m=>m.role==='assistant'):c.messages.filter(m=>m.role!=='system');dl(bExpH(ms,c.title,p.model),(c?.title||'e')+'.html','text/html')}
function eDoc(){const c=S.chats[S.currentChatId];const f=document.getElementById('expFmt').value;const ms=f==='pure'?c.messages.filter(m=>m.role==='assistant'):c.messages.filter(m=>m.role!=='system');const body=ms.map(m=>`<h3>${m.role==='user'?'我':'AI'}</h3><p style="white-space:pre-wrap">${esc(m.content)}</p><hr>`).join('');dl(`<html><head><meta charset="utf-8"><title>${esc(c.title)}</title></head><body><h1>${esc(c.title)}</h1>${body}</body></html>`,(c?.title||'e')+'.doc','application/msword')}
function cpExp(){const ta=document.getElementById('expTA');ta.select();navigator.clipboard.writeText(ta.value).then(()=>toast('已复制')).catch(()=>{document.execCommand('copy');toast('已复制')})}
function bExpH(ms,title,model){const d=new Date().toLocaleString('zh-CN');const mh=ms.map(m=>`<div style="display:flex;gap:10px;margin-bottom:20px;${m.role==='user'?'flex-direction:row-reverse':''}"><div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:${m.role==='user'?'#e3f2fd':'#e8f5e9'}">${m.role==='user'?'🙋‍♂️':'🤖'}</div><div style="max-width:75%;padding:12px 16px;border-radius:14px;line-height:1.7;font-size:14px;white-space:pre-wrap;background:${m.role==='user'?'#d1e7ff':'#fff'};box-shadow:0 1px 2px rgba(0,0,0,.05)">${esc(m.content).replace(/\n/g,'<br>')}</div></div>`).join('');return`<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(title)}</title></head><body style="font-family:-apple-system,sans-serif;background:#f0f2f5;margin:0"><div style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px 24px"><h1 style="font-size:20px;margin:0">💬 ${esc(title)}</h1><div style="font-size:11px;opacity:.75;margin-top:4px">${d} | 🧠 ${esc(model)}</div></div><div style="max-width:860px;margin:0 auto;padding:20px 14px">${mh}</div></body></html>`}

// ===== Snapshot =====
function eSnap(){dl(JSON.stringify(S,null,2),'ZenMux_'+new Date().toISOString().slice(0,10)+'.json','application/json');toast('已导出')}
function iSnap(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){try{const d=JSON.parse(e.target.result);if(d.profiles)S.profiles=d.profiles;if(d.chats)S.chats=d.chats;if(d.activeProfileIdx!==undefined)S.activeProfileIdx=d.activeProfileIdx;S.currentChatId=Object.keys(S.chats)[0]||null;if(!S.currentChatId)newChat(false);save();render();closeM('snap');toast('✅ 恢复成功')}catch(e){toast('失败: '+e.message,'er')}};r.readAsText(f);input.value=''}

// ===== Utils =====
function togSB(){document.getElementById('sb').classList.toggle('open');document.getElementById('sbOv').classList.toggle('show')}
function closeSB(){if(window.innerWidth<=768){document.getElementById('sb').classList.remove('open');document.getElementById('sbOv').classList.remove('show')}}
function openM(n){document.getElementById('mo-'+n).classList.add('show');if(n==='set')rEngF();if(n==='cs')updCSUI();if(n==='exp')updExp();if(n==='snap'&&/iPad|iPhone|iPod/.test(navigator.userAgent))document.getElementById('iosW').style.display='block'}
function closeM(n){document.getElementById('mo-'+n).classList.remove('show')}
function hKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}
function aRsz(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function toast(msg,type='ok'){const c=document.getElementById('tc');const t=document.createElement('div');t.className='tt '+type;t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),2500)}
function dl(c,n,m){const b=new Blob([c],{type:m+';charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}
function esc(t){if(!t)return'';const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function cntW(t){if(!t)return 0;return(t.match(/[\u4e00-\u9fff]/g)||[]).length+(t.match(/[a-zA-Z]+/g)||[]).length}

document.querySelectorAll('.mo').forEach(o=>o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')}));
document.addEventListener('click',function(e){if(!e.target.closest('.att-btn')&&!e.target.closest('.att-pan'))document.getElementById('attPan').classList.remove('show')});

// ===== Init =====
load();render();
if(/iPad|iPhone|iPod/.test(navigator.userAgent)){const lr=localStorage.getItem('zm_ios');if(!lr||Date.now()-+lr>3*86400000){setTimeout(()=>toast('💡 iOS建议定期导出快照'),1500);localStorage.setItem('zm_ios',Date.now()+'')}}
</script>
